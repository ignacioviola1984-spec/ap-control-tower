# Tema operativo del producto. El puerto se recibe por CLI o por el entorno.

[theme]
base = "light"
primaryColor = "#0F4C81"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F3F6F9"
textColor = "#172234"
borderColor = "#CBD5E1"
dataframeBorderColor = "#CBD5E1"
dataframeHeaderBackgroundColor = "#EAF0F6"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "8px"
buttonRadius = "8px"
baseFontSize = 15
headingFontSizes = ["30px", "24px", "20px", "17px", "15px", "13px"]
headingFontWeights = [700, 600, 600, 600, 600, 600]
greenColor = "#137A4B"
orangeColor = "#9A5B00"
redColor = "#B42318"
blueColor = "#0F4C81"

# Barra lateral corporativa: azul profundo con texto claro. Al oscurecer el
# fondo hay que ajustar TODOS los colores, no solo el de fondo, para no perder
# contraste en botones, bordes y texto secundario.
[theme.sidebar]
backgroundColor = "#0D2149"
secondaryBackgroundColor = "#17356B"
textColor = "#E8EEF7"
primaryColor = "#5AA0F2"
linkColor = "#9DC4F5"
borderColor = "#1E4079"
codeBackgroundColor = "#17356B"
showWidgetBorder = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = "none"
showSidebarNavigation = true
