# Tema operativo del producto. El puerto se recibe por CLI o por el entorno.

[theme]
base = "light"
primaryColor = "#0F4C81"
# Lienzo gris azulado con las tarjetas en blanco: da profundidad sin sombras
# fuertes y hace legible una pantalla densa de datos financieros.
backgroundColor = "#F4F7FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0F1B2D"
borderColor = "#DCE3ED"
linkUnderline = false
dataframeBorderColor = "#DCE3ED"
dataframeHeaderBackgroundColor = "#F4F7FB"
showWidgetBorder = true
showSidebarBorder = false
baseRadius = "10px"
buttonRadius = "10px"
baseFontSize = 15
headingFontSizes = ["28px", "22px", "18px", "16px", "14px", "13px"]
headingFontWeights = [700, 650, 650, 650, 600, 600]
greenColor = "#127A4B"
orangeColor = "#9A5B00"
redColor = "#B42318"
blueColor = "#0F4C81"
# Índigo reservado a la IA: ningún elemento operativo lo usa, de modo que ver
# violeta en pantalla significa siempre "esto lo dijo el asistente".
violetColor = "#6D4AFF"

# Barra lateral corporativa: azul profundo con texto claro. Al oscurecer el
# fondo hay que ajustar TODOS los colores, no solo el de fondo, para no perder
# contraste en botones, bordes y texto secundario.
[theme.sidebar]
backgroundColor = "#0D2149"
secondaryBackgroundColor = "#17356B"
textColor = "#E8EEF7"
primaryColor = "#5AA0F2"
linkColor = "#9DC4F5"
borderColor = "#1E4079"
codeBackgroundColor = "#17356B"
showWidgetBorder = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = "none"
showSidebarNavigation = true
