# Theming de AP Control Tower. Sin [server].port: el puerto SIEMPRE llega por
# CLI (--server.port) o env PORT en el contenedor; nada hardcodeado.

[theme]
base = "light"
primaryColor = "#0F4C81"
backgroundColor = "#F4F6F9"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1A2332"

[browser]
gatherUsageStats = false
