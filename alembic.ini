# Alembic - migraciones de la capa de persistencia (Fase 1).
# La URL NO se escribe aca: env.py la resuelve desde AP_DATABASE_URL /
# DATABASE_URL (o el argumento -x db_url=...). Nunca credenciales en el repo.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url se deja vacio a proposito (lo provee env.py desde el entorno).
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
