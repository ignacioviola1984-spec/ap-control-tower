# Postgres SOLO para desarrollo de la persistencia (Fase 1), en WSL.
# SEPARADO de la imagen de la demo: esto no se despliega. La demo sigue
# corriendo sin base. No contiene secretos de produccion: la password de este
# Postgres LOCAL se toma de config/persistence.env (gitignoreado) o del default
# de desarrollo de abajo. NUNCA usar estas credenciales fuera de local.
#
# Uso (desde WSL, en la raiz del repo):
#   docker compose -f docker-compose.dev.yml up -d
#   export AP_DATABASE_URL="postgresql+psycopg://ap:ap_dev_local@localhost:5432/ap_control_tower"
#   python -m alembic upgrade head
#   docker compose -f docker-compose.dev.yml down       # (agregar -v para borrar datos)

services:
  postgres:
    image: postgres:16-alpine
    container_name: ap-control-tower-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ap_dev_local}
      POSTGRES_DB: ${POSTGRES_DB:-ap_control_tower}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ap_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ap} -d ${POSTGRES_DB:-ap_control_tower}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- Cola de tareas (Fase 5) ---
  redis:
    image: redis:7-alpine
    container_name: ap-control-tower-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Worker Celery de DEV: instala deps al arrancar y monta el codigo. Las
  # imagenes de produccion se construyen aparte (Fase 10); esto es conveniencia
  # local. Document AI usa ADC/entorno; nunca credenciales en el compose.
  worker:
    image: python:3.12-slim
    container_name: ap-control-tower-worker-dev
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      AP_BROKER_URL: redis://redis:6379/0
      AP_RESULT_BACKEND: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    command: >
      sh -c "pip install -q -r requirements.txt -r requirements-worker.txt -r requirements-persistence.txt &&
             celery -A ap_control_tower.worker.celery_app:celery_app worker --loglevel=info --concurrency=2"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ap_pgdata_dev:
